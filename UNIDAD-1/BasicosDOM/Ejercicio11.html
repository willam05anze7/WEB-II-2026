<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 11 REMOVECHILD</title>
</head>
<body>
    <div id="contenedor">
        <div id="eliminado">eliminado</div>
    </div>
    <script>
        const elementoEliminar = document.getElementById('eliminado')
        const elementoPadre= elementoEliminar.parentElement; //identifica quien es el padre del elemento a eliminar
        elementoPadre.removeChild(elementoEliminar); //elimina el elemento hijo del padre
    </script>
</body>
</html>
