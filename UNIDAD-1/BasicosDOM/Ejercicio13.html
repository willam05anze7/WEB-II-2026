<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 13 PREVENT DEFAULT</title>
</head>
<body>
    <div id="enlace" href="https://www.google.com">enlace</div>
    <script>
        const enlace = document.getElementById('enlace')
        enlace.addEventListener('click', (evento)=>{
            evento.preventDefault()
            alert('el enlace ah explotado ')
        })
    </script>
</body>
</html>
