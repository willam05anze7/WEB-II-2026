<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 2 SELECCION DE ELEMENTOS LLAMADO POR CLASE</title>
</head>
<body>
    <div class="clase-1">Elemento 1</div>
    <div class="clase-1">Elemento 2</div>
    <div class="clase-1">Elemento 3</div>
    <script>
        const elementos=document.getElementsByClassName('clase-1')
        for(const elemento of elementos){
            elemento.textContent='goooool'
            elemento.style.backgroundColor='red'
        }
    </script>
</body>
