<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doguito Petshop | Actualizar cliente</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet"
    />
    <link
        href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/card.css" />
    <link rel="stylesheet" href="../assets/css/register_product.css" />
    <link rel="stylesheet" href="../assets/css/componentes/inputs.css" />
    <link rel="stylesheet" href="../assets/css/componentes/button.css" />
    </head>
    <body>
    <header class="header container">
        <img
        src="../assets/img/doguitoadm.svg"
        alt="Logo Doguito"
        class="header__logo"
        />
        <nav>
        <ul class="header__list-nav">
            <li class="header__link"><a href="lista_preducto.html">Dashboard</a></li>
            <li class="header__link"><a href="registrar_producto.html">Pelicula</a></li>
            <li class="header__link"><a href="lista_cliente.html">Clientes </a></li>
            <li class="header__link"><a href="lista_pet.html">boleto</a></li>
        </ul>
        </nav>
    </header>
    <main class="container flex flex--center flex--column">
        <section class="card cadastro">
        <h1 class="card__title">Editar</h1>
        <form action="#" class="flex flex--column" data-form>
            <div class="input-container">
            <input
                name="nombre_pelicula"
                id="nombre_pelicula"
                class="input"
                type="text"
                placeholder="nombre_pelicula"
                required
                data-nombre_pelicula
            />
            <label class="input-label" for="nombre_pelicula">Nombre de la pelicula</label>
            <span class="input-menssage-error">Este campo es requerido</span>
            </div>
            <div class="input-container">
            <input
                name="precio"
                id="precio"
                class="input"
                type="text"
                placeholder="precio"
                required
                data-precio
            />
            <label class="input-label" for="precio">Precio</label>
            <span class="input-menssage-error">Este campo es requerido</span>
            </div>
            
            <button type="submit" class="button">Editar pelicula</button>
            <label for="descripcion"></label>
        </form>
        </section>
    </main>
    <script src="../controllers/products_actualizar.js" type="module"></script>
    </body>
</html>
