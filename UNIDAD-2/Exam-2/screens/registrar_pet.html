<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doguito Petshop | Registro de Mascota</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap"
    rel="stylesheet"
    />
    <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/card.css" />
    <link rel="stylesheet" href="../assets/css/register_pet.css" />
    <link rel="stylesheet" href="../assets/css/componentes/inputs.css" />
    <link rel="stylesheet" href="../assets/css/componentes/button.css" />
</head> 
<body>
    <header class="header container">
    <img
        src="../assets/img/doguitoadm.svg"
        alt="Logo Doguito"
        class="header_logo"
    />
    <nav>
        <ul class="header__list-nav">
            <li class="header__link"><a href="lista_preducto.html">Dashboard</a></li>
            <li class="header__link"><a href="registrar_producto.html">Pelicula</a></li>
            <li class="header__link"><a href="lista_cliente.html">Clientes</a></li>
            <li class="header__link"><a href="lista_pet.html">Boleto</a></li>
        </ul>
    </nav>
    </header>

    <main class="container flex flex--center flex--column">
    <section class="card cadastro">
        <h1 class="card__title">Registrar Boleto</h1>
        
        <form action="#" class="flex flex--column" data-form>
        <div class="input-container">
            <input
            name="descripcion"
            id="descripcion"
            class="input"
            type="text"
            placeholder=" "
            data-descripcion
            required
            />
            <label class="input-label" for="descripcion">Descripción</label>
            <span class="input-menssage-error">La descripción es obligatoria</span>
        </div>

        <div class="input-container">
            <input
            name="cliente"
            id="cliente"
            class="input"
            type="text"
            placeholder=" "
            data-cliente
            required
            />
            <label class="input-label" for="cliente">ID del cliente</label>
            <span class="input-menssage-error">El ID del cliente es obligatorio</span>
        </div>

        <div class="input-container">
            <input
            name="pelicula"
            id="pelicula"
            class="input"
            type="text"
            placeholder=" "
            data-pelicula
            required
            />
            <label class="input-label" for="pelicula">ID de la Pelicula</label>
            <span class="input-menssage-error">El ID de la película es obligatorio</span>
        </div>


        <button type="submit" class="button">
            Registrar Boleto
        </button>
        </form>
    </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js" integrity="sha512-UNM1njAgOFUa74Z0bADwAq8gbTcqZC8Ej4xPSzpnh0l6KMevwvkBvbldF9uR++qKeJ+MOZHRjV1HZjoRvjDfNQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../controllers/pet_registro.js" type="module"></script>
</body>
</html>
